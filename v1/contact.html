<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ITXMEN</title>
    <link rel="stylesheet" href="styles.css">
    <script src="components.js" defer></script>
    <script src="main.js" defer></script>
    <style>
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <site-header></site-header>

    <main>
        <div class="grid-bg"></div>
        <div class="blob blob-2" style="width: 400px; height: 400px; right: 0; left: auto; top: 20%;"></div>

        <section>
            <div class="container">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 4rem;">

                    <div class="fade-up">
                        <h1 style="margin-bottom: 1rem;">Let's Talk <span class="gradient-text">Growth</span></h1>
                        <p>Ready to leverage IT as your greatest strategic advantage? Reach out to Stephen Nolan and the
                            ITXMEN team today.</p>

                        <div style="margin-top: 3rem;">
                            <h3 style="margin-bottom: 0.5rem;">Email</h3>
                            <p style="color: #fff;">Viraladdicktion@gmail.com</p>
                        </div>

                        <div class="disclaimer-inline" style="margin-top: 3rem;">
                            THIS IS A DEMO WEBSITE PREPARED BY MATTYJACKS.COM AND IS NOT AUTHORIZED BY ITXMEN OR STEPHEN
                            NOLAN. This is a sales pitch site.
                        </div>
                    </div>

                    <div class="card fade-up delay-2">
                        <form onsubmit="event.preventDefault(); alert('Demo Form Submitted!');">
                            <div class="form-group">
                                <label for="name">Full Name</label>
                                <input type="text" id="name" class="form-control" required placeholder="John Doe">
                            </div>
                            <div class="form-group">
                                <label for="email">Work Email</label>
                                <input type="email" id="email" class="form-control" required
                                    placeholder="john@company.com">
                            </div>
                            <div class="form-group">
                                <label for="company">Company</label>
                                <input type="text" id="company" class="form-control" placeholder="Acme Corp">
                            </div>
                            <div class="form-group">
                                <label for="message">How can we help?</label>
                                <textarea id="message" rows="5" class="form-control" required
                                    placeholder="I'm looking for fractional IT leadership..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                        </form>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <site-footer></site-footer>
</body>

</html>
